name: Build Study Reader
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        # Hum sirf Librera version build karenge, Pro ko skip karenge
        run: ./gradlew assembleLibreraDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Librera-Reader-APK
          path: "**/build/outputs/apk/librera/debug/*.apk" 
          
