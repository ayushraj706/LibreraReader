name: Build Study Reader
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK with All Dummy Keys
        # Is baar humne Reward ID aur Open Ad ID bhi add kar di hai
        run: |
          ./gradlew assembleDebug \
            -PRELEASE_STORE_FILE=temp \
            -PRELEASE_STORE_PASSWORD=temp \
            -PRELEASE_KEY_ALIAS=temp \
            -PRELEASE_KEY_PASSWORD=temp \
            -Plibrera_appGdriveKey=dummy_key \
            -Plibrera_appGdriveSecret=dummy_secret \
            -Plibrera_admobAppId=ca-app-pub-3940256099942544~3347511713 \
            -Plibrera_admobBannerId=ca-app-pub-3940256099942544/6300978111 \
            -Plibrera_admobInterstitialId=ca-app-pub-3940256099942544/1033173712 \
            -Plibrera_admobFullId=ca-app-pub-3940256099942544/1033173712 \
            -Plibrera_admobNativeId=ca-app-pub-3940256099942544/2247696110 \
            -Plibrera_admobRewardId=ca-app-pub-3940256099942544/5224354917 \
            -Plibrera_admobOpenId=ca-app-pub-3940256099942544/3419835294

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Librera-Reader-APK
          path: "**/build/outputs/apk/debug/*.apk"
          
