name: Build Study Reader
on:
  workflow_dispatch: # Manual build start karne ke liye

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK with Dummy Keys
        # Yahan humne saari missing properties ko dummy values se bhar diya hai
        run: |
          ./gradlew assembleDebug \
            -PRELEASE_STORE_FILE=temp \
            -PRELEASE_STORE_PASSWORD=temp \
            -PRELEASE_KEY_ALIAS=temp \
            -PRELEASE_KEY_PASSWORD=temp \
            -Plibrera_appGdriveKey=dummy_key \
            -Plibrera_appGdriveSecret=dummy_secret

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Librera-Reader-APK
          path: "**/build/outputs/apk/debug/*.apk"
          
