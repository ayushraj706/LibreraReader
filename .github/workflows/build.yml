name: Build Ayush Study Reader
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug -PRELEASE_STORE_FILE=temp -PRELEASE_STORE_PASSWORD=temp -PRELEASE_KEY_ALIAS=temp -PRELEASE_KEY_PASSWORD=temp

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyReader-APK
          path: "**/build/outputs/apk/debug/*.apk"
          
